name: VideoXML

on:
  schedule:
    - cron: '0 3 */2 * *'  # Run at 3am every 48 hours
  workflow_dispatch:

jobs:
  scrape_and_generate_epg:
    name: Scrape TV Programming and Generate EPG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz

      - name: Run EPG Script
        run: |
          python programme/home/videoxml.py > programme/home/videoall.xml
        env:
          TZ: America/Vancouver  # Set the timezone

      - name: Pull changes from remote
        run: git pull origin master

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update token"
          branch: master
          files: |
            programme/home/videoxml.xml
        env:
          GITHUB_TOKEN: ${{ secrets.ROTANA_TOKEN }}
