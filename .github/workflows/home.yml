name: Make Home Programme
on:
  schedule:
    - cron: '10 */8 * * *'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: 3.11
      - name: config
        run: |
          git pull
          git config --global user.email "newf276@free.com"
          git config --global user.name "newf276"
      - name: generate
        run: |
          cd programme/
          pwd
          echo "Installing dependencies..."
          python3 -m pip install lxml pgzip requests
          echo "Generating Programme..."
          python3 -u index.py -zo home.xml --source="home/programme/home.txt" --gen-name="tvepg" --gen-url="tvepg.com"
          mv -v home.xml.gz ..
          cd ../..
      - name: commit
        run: |
          git add -A
          git commit -m "Generate Home Programme"
          git push
