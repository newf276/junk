name: Make Free Programme
on:
  schedule:
    - cron: '00 00-12/6 * * *'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - name: config
        run: |
          git pull
          git config --global user.email "warningfm@gmail.com"
          git config --global user.name "warningfm"
      - name: generate
        run: |
          cd programme/scripts
          pwd
          python3 -m pip install lxml
          echo "Generating EPG for free playlist..."
          python3 index.py guide.xml free/free.txt 
          mv -v guide.xml free/
          cd ..
      - name: commit
        run: |
          git add -A
          git commit -m "Generate EPG every day"
          git push