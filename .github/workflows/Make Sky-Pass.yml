name: 6. Make Sky-Pass Programme
on:
  schedule:
    - cron: '40 */6 * * *'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: 3.11
      - name: config
        run: |
          git pull
          git config --global user.email "newf@gmail.com"
          git config --global user.name "newf276"
      - name: generate
        run: |
          cd programme/scripts
          pwd
          echo "Installing dependencies..."
          python3 -m pip install lxml pgzip requests
          echo "Generating EPG..."
          python3 -u index.py -zo skypass.xml --source="skypass/skypass.txt" --gen-name="Libretelevision" --gen-url="libretv.my.id"
          mv -v scripts/skypass.xml.gz ..
          cd ../..
      - name: commit
        run: |
          git add -A
          git commit -m "Make Sky-Pass Programme"
          git push
