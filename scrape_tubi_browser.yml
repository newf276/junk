name: Run Tubi Playlist Script

on:
  schedule:
    - cron: '0 0 * * *' # Runs once a day at midnight UTC
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 playwright

    - name: Install Playwright Browsers
      run: |
        python -m playwright install firefox

    - name: Run Python script
      run: |
        python scrape_tubi.py || exit 1  # Fail the workflow if the Python script fails

    - name: Checkout the public repository
      uses: actions/checkout@v3
      with:
        repository: dtankdempse/tubi-m3u
        token: ${{ secrets.SECRET_PAT }}
        path: tubi-m3u

    - name: Copy playlists to the public repository
      run: |
        cp tubi_playlist_us.m3u tubi-m3u/
        cp tubi_epg_us.xml tubi-m3u/
        
    - name: Commit and force push changes to the public repository without saving history
      run: |
        cd tubi-m3u
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
        FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
        git reset --soft $FIRST_COMMIT

        git add .
        git commit -m "Update playlists" || echo "No changes to commit"

        git push -f https://$PAT@github.com/dtankdempse/tubi-m3u.git main
      env:
        PAT: ${{ secrets.SECRET_PAT }}
